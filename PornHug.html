<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>👀 Loading...</title>
  <link href="https://fonts.googleapis.com/css2?family=Pacifico&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #ffe0ec;
      background-image:
        radial-gradient(circle at 20% 20%, #ffb3cb 0%, transparent 50%),
        radial-gradient(circle at 80% 80%, #ffc8a2 0%, transparent 50%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Pacifico', cursive;
      overflow: hidden;
      position: relative;
    }

    .main-word {
      font-size: clamp(4rem, 18vw, 12rem);
      color: #c0392b;
      text-shadow:
        6px 6px 0 #7b0000,
        0 0 40px rgba(192, 57, 43, 0.4);
      letter-spacing: 4px;
      z-index: 10;
      animation: pulse 1.8s ease-in-out infinite;
      user-select: none;
      text-align: center;
    }

    @keyframes pulse {
      0%, 100% { transform: scale(1) rotate(-1deg); }
      50%       { transform: scale(1.06) rotate(1deg); }
    }

    /* ---- Bouncing pig ---- */
    .pig {
      position: fixed;
      font-size: 3.5rem;
      user-select: none;
      pointer-events: none;
      will-change: transform;
      filter: drop-shadow(2px 4px 4px rgba(0,0,0,0.2));
    }

    /* Each pig gets its own keyframe via CSS custom properties + JS */
    @keyframes bounce1  { 0%,100%{transform:translate(0,0) rotate(0deg)}  25%{transform:translate(var(--dx1),var(--dy1)) rotate(20deg)}   50%{transform:translate(var(--dx2),var(--dy2)) rotate(-10deg)}  75%{transform:translate(var(--dx3),var(--dy3)) rotate(15deg)} }
    @keyframes bounce2  { 0%,100%{transform:translate(0,0) rotate(5deg)}   25%{transform:translate(var(--dx2),var(--dy2)) rotate(-25deg)}  50%{transform:translate(var(--dx3),var(--dy3)) rotate(10deg)}   75%{transform:translate(var(--dx1),var(--dy1)) rotate(-20deg)} }
    @keyframes bounce3  { 0%,100%{transform:translate(0,0) rotate(-8deg)}  25%{transform:translate(var(--dx3),var(--dy3)) rotate(18deg)}   50%{transform:translate(var(--dx1),var(--dy1)) rotate(-5deg)}   75%{transform:translate(var(--dx2),var(--dy2)) rotate(22deg)} }
    @keyframes bounce4  { 0%,100%{transform:translate(0,0) rotate(3deg)}   25%{transform:translate(var(--dx1),var(--dy3)) rotate(-15deg)}  50%{transform:translate(var(--dx3),var(--dy2)) rotate(25deg)}   75%{transform:translate(var(--dx2),var(--dy1)) rotate(-8deg)} }
    @keyframes bounce5  { 0%,100%{transform:translate(0,0) rotate(-12deg)} 25%{transform:translate(var(--dx2),var(--dy1)) rotate(10deg)}   50%{transform:translate(var(--dx1),var(--dy3)) rotate(-22deg)}  75%{transform:translate(var(--dx3),var(--dy2)) rotate(5deg)} }
    @keyframes bounce6  { 0%,100%{transform:translate(0,0) rotate(7deg)}   25%{transform:translate(var(--dx3),var(--dy2)) rotate(-18deg)}  50%{transform:translate(var(--dx2),var(--dy1)) rotate(12deg)}   75%{transform:translate(var(--dx1),var(--dy3)) rotate(-25deg)} }
    @keyframes bounce7  { 0%,100%{transform:translate(0,0) rotate(-4deg)}  25%{transform:translate(var(--dx1),var(--dy2)) rotate(22deg)}   50%{transform:translate(var(--dx3),var(--dy1)) rotate(-12deg)}  75%{transform:translate(var(--dx2),var(--dy3)) rotate(8deg)} }
    @keyframes bounce8  { 0%,100%{transform:translate(0,0) rotate(10deg)}  25%{transform:translate(var(--dx2),var(--dy3)) rotate(-5deg)}   50%{transform:translate(var(--dx1),var(--dy2)) rotate(20deg)}   75%{transform:translate(var(--dx3),var(--dy1)) rotate(-15deg)} }

    .oink-label {
      position: fixed;
      bottom: 24px;
      width: 100%;
      text-align: center;
      font-size: 1.1rem;
      color: #c0392b;
      opacity: 0.6;
      letter-spacing: 2px;
      font-family: 'Pacifico', cursive;
      animation: fade 2s ease-in-out infinite alternate;
    }

    @keyframes fade { from { opacity: 0.3; } to { opacity: 0.7; } }
  </style>
</head>
<body>

  <div class="main-word">¡Cochino!</div>
  <div class="oink-label">🐷 oink oink 🐷</div>

  <script>
    const pigEmojis = ['🐷','🐷','🐽','🐖','🐷','🐽','🐷','🐷'];
    const animations = ['bounce1','bounce2','bounce3','bounce4','bounce5','bounce6','bounce7','bounce8'];

    function rand(min, max) { return Math.random() * (max - min) + min; }

    pigEmojis.forEach((emoji, i) => {
      const pig = document.createElement('div');
      pig.classList.add('pig');
      pig.textContent = emoji;

      // Random starting position spread across the viewport
      const startX = rand(2, 90); // % of viewport width
      const startY = rand(5, 90); // % of viewport height
      pig.style.left = startX + 'vw';
      pig.style.top  = startY + 'vh';

      // Random deltas for the keyframe variables
      const dx1 = rand(-18, 18) + 'vw';
      const dy1 = rand(-15, 15) + 'vh';
      const dx2 = rand(-20, 20) + 'vw';
      const dy2 = rand(-18, 18) + 'vh';
      const dx3 = rand(-14, 14) + 'vw';
      const dy3 = rand(-12, 12) + 'vh';
      pig.style.setProperty('--dx1', dx1);
      pig.style.setProperty('--dy1', dy1);
      pig.style.setProperty('--dx2', dx2);
      pig.style.setProperty('--dy2', dy2);
      pig.style.setProperty('--dx3', dx3);
      pig.style.setProperty('--dy3', dy3);

      const duration = rand(2.5, 5);
      const delay    = rand(0, 2);
      pig.style.animation = `${animations[i]} ${duration}s ${delay}s ease-in-out infinite`;
      pig.style.fontSize  = rand(2.5, 5) + 'rem';

      document.body.appendChild(pig);
    });
  </script>
</body>
</html>
